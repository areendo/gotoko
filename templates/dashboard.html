<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-2xl font-bold">Dashboard</h1>
      <a href="/logout" class="text-sm text-red-600 font-medium">Logout</a>
    </div>

    <div class="bg-white p-4 rounded shadow space-y-3">
      <input id="name" placeholder="Nama produk" class="w-full border border-gray-300 p-3 rounded-lg">
      <input id="price" placeholder="Harga" class="w-full border border-gray-300 p-3 rounded-lg">
      <input id="stock" placeholder="Stok" class="w-full border border-gray-300 p-3 rounded-lg">

      <select id="categorySelect" class="w-full border border-gray-300 p-3 rounded-lg"></select>
      <input id="newCategory" placeholder="Kategori baru" class="w-full border border-gray-300 p-3 rounded-lg hidden">

      <input id="imageFile" type="file" accept=".jpg,.jpeg,.png,.webp" class="w-full border border-gray-300 p-3 rounded-lg">

      <button id="addBtn" class="bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg w-full">
        Tambah Produk
      </button>
    </div>

    <div id="list" class="mt-4 space-y-2"></div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4">
    <div class="bg-white p-4 rounded w-full max-w-md space-y-3">
      <h2 class="font-bold text-lg">Edit Produk</h2>
      <input id="e_name" class="w-full border border-gray-300 p-3 rounded-lg" placeholder="Nama">
      <input id="e_price" class="w-full border border-gray-300 p-3 rounded-lg" placeholder="Harga">
      <input id="e_stock" class="w-full border border-gray-300 p-3 rounded-lg" placeholder="Stok">
      <input id="e_category" class="w-full border border-gray-300 p-3 rounded-lg" placeholder="Kategori">
      <input id="e_image" type="file" accept=".jpg,.jpeg,.png,.webp" class="w-full border border-gray-300 p-3 rounded-lg">

      <div class="flex gap-2">
        <button id="saveBtn" class="bg-green-600 hover:bg-green-700 text-white p-3 rounded-lg w-full">Simpan</button>
        <button id="cancelBtn" class="bg-gray-200 p-3 rounded-lg w-full">Batal</button>
      </div>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('name');
    const priceInput = document.getElementById('price');
    const stockInput = document.getElementById('stock');
    const categorySelect = document.getElementById('categorySelect');
    const newCategory = document.getElementById('newCategory');
    const imageFile = document.getElementById('imageFile');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');

    const modal = document.getElementById('modal');
    const e_name = document.getElementById('e_name');
    const e_price = document.getElementById('e_price');
    const e_stock = document.getElementById('e_stock');
    const e_category = document.getElementById('e_category');
    const e_image = document.getElementById('e_image');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    let editId = 0;
    let editImage = '';

    categorySelect.addEventListener('change', () => {
      if (categorySelect.value === '__new') {
        newCategory.classList.remove('hidden');
      } else {
        newCategory.classList.add('hidden');
        newCategory.value = '';
      }
    });

    async function loadCategories() {
      const res = await fetch('/api/categories');

      if (res.status === 401) {
        location.href = '/login';
        return;
      }

      const data = await res.json();
      categorySelect.innerHTML = '';

      data.forEach(c => {
        categorySelect.innerHTML += `<option value="${c}">${c}</option>`;
      });

      categorySelect.innerHTML += `<option value="__new">+ kategori baru</option>`;
    }

    async function load() {
      const res = await fetch('/api/products');
      const data = await res.json();

      list.innerHTML = '';

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = `<div class="bg-white p-4 rounded shadow text-gray-500">Belum ada produk.</div>`;
        return;
      }

      data.forEach(p => {
        list.innerHTML += `
          <div class="bg-white p-3 rounded shadow flex justify-between items-center gap-3">
            <div>
              <div class="font-semibold">${p.name}</div>
              <div class="text-sm text-gray-500">${p.category}</div>
              <div class="text-sm text-green-700">Rp ${Number(p.price).toLocaleString('id-ID')} • stok ${p.stock}</div>
            </div>
            <div class="flex gap-2">
              <button class="px-3 py-2 rounded bg-yellow-100" onclick='edit(${JSON.stringify(p)})'>Edit</button>
              <button class="px-3 py-2 rounded bg-red-100" onclick="delProduct(${p.id})">Hapus</button>
            </div>
          </div>
        `;
      });
    }

    async function uploadSelectedImage(file) {
      const fd = new FormData();
      fd.append('image', file);

      const res = await fetch('/api/upload', {
        method: 'POST',
        body: fd
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || 'Upload gagal');
      }

      return data.url;
    }

    async function addProduct() {
      let category = categorySelect.value;
      if (category === '__new') category = newCategory.value.trim();

      let img = '';
      const file = imageFile.files[0];
      if (file) {
        img = await uploadSelectedImage(file);
      }

      const body = new URLSearchParams();
      body.append('name', nameInput.value);
      body.append('price', priceInput.value);
      body.append('stock', stockInput.value);
      body.append('category', category);
      body.append('image', img);

      const res = await fetch('/api/create', { method: 'POST', body });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        alert(data.message || 'Gagal menambah produk');
        return;
      }

      nameInput.value = '';
      priceInput.value = '';
      stockInput.value = '';
      imageFile.value = '';
      newCategory.value = '';

      await loadCategories();
      await load();
    }

    function edit(p) {
      editId = p.id;
      editImage = p.image || '';

      e_name.value = p.name;
      e_price.value = p.price;
      e_stock.value = p.stock;
      e_category.value = p.category;

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    async function saveEdit() {
      const file = e_image.files[0];
      if (file) {
        editImage = await uploadSelectedImage(file);
      }

      const body = new URLSearchParams();
      body.append('id', editId);
      body.append('name', e_name.value);
      body.append('price', e_price.value);
      body.append('stock', e_stock.value);
      body.append('category', e_category.value);
      body.append('image', editImage);

      const res = await fetch('/api/update-product', { method: 'POST', body });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        alert(data.message || 'Gagal update produk');
        return;
      }

      closeModal();
      await load();
      await loadCategories();
    }

    function closeModal() {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      e_image.value = '';
    }

    async function delProduct(id) {
      if (!confirm('Hapus produk ini?')) return;

      const body = new URLSearchParams();
      body.append('id', id);

      const res = await fetch('/api/delete', { method: 'POST', body });
      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        alert(data.message || 'Gagal hapus produk');
        return;
      }

      await load();
      await loadCategories();
    }

    addBtn.addEventListener('click', addProduct);
    saveBtn.addEventListener('click', saveEdit);
    cancelBtn.addEventListener('click', closeModal);

    load();
    loadCategories();
  </script>
</body>
</html>
