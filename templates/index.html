<!DOCTYPE html>
<html>
<head>
    <title>GoToko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4">🛒 GoToko</h1>

    <a href="/add" class="btn btn-primary mb-3">+ Tambah Produk</a>

    <div class="row">
        {{ range . }}
        <div class="col-md-4">
            <div class="card mb-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ .Name }}</h5>
                    <p class="card-text">Rp {{ .Price }}</p>

                    <a href="/edit?id={{ .ID }}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="/delete?id={{ .ID }}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
        </div>
        {{ else }}
        <p>Belum ada produk</p>
        {{ end }}
    </div>
</div>

</body>
</html>
