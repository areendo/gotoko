<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GoToko</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div class="bg-white p-4 shadow flex items-center justify-between">
    <h1 class="text-xl font-bold">🛒 GoToko</h1>
    <a href="/login" class="text-sm text-green-700 font-medium">Login Admin</a>
  </div>

  <div class="p-4">
    <div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>
  </div>

  <script>
    const productsEl = document.getElementById('products');

    async function load() {
      productsEl.innerHTML = '<p class="text-gray-500">Loading...</p>';

      const res = await fetch('/api/products');
      const products = await res.json();

      if (!Array.isArray(products) || products.length === 0) {
        productsEl.innerHTML = '<p class="text-gray-500">Belum ada produk.</p>';
        return;
      }

      productsEl.innerHTML = '';
      products.forEach(p => {
        productsEl.innerHTML += `
          <div class="bg-white p-3 rounded shadow">
            <img
              src="${p.image || 'https://placehold.co/400x300?text=No+Image'}"
              class="h-32 w-full object-cover rounded bg-gray-100"
              alt="${p.name}"
            >
            <h2 class="mt-2 font-semibold">${p.name}</h2>
            <p class="text-sm text-gray-500">${p.category}</p>
            <p class="mt-1 font-bold text-green-700">Rp ${Number(p.price).toLocaleString('id-ID')}</p>
            <p class="text-sm text-gray-600">Stok: ${p.stock}</p>
          </div>
        `;
      });
    }

    load();
  </script>
</body>
</html>
