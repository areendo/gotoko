<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GoToko - Belanja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">GoToko</a>
            <div class="d-flex gap-2">
                <a href="/cart" class="btn btn-dark">Keranjang ({{ .CartCount }})</a>
                <a href="/login" class="btn btn-outline-primary">Admin</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="mb-4">
            <h1 class="fw-bold">Belanja Produk</h1>
            <p class="text-muted">Pilih produk lalu masukkan ke keranjang.</p>
        </div>

        <div class="row g-4">
            {{ range .Products }}
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">{{ .Name }}</h5>
                        <p class="card-text text-muted">{{ .Description }}</p>
                        <h4 class="mt-auto">Rp {{ .Price }}</h4>

                        <form action="/cart/add" method="POST" class="mt-3">
                            <input type="hidden" name="id" value="{{ .ID }}">
                            <button type="submit" class="btn btn-success w-100">Tambah ke Keranjang</button>
                        </form>
                    </div>
                </div>
            </div>
            {{ else }}
            <div class="col-12">
                <div class="alert alert-warning">Belum ada produk.</div>
            </div>
            {{ end }}
        </div>
    </div>
</body>
</html>
