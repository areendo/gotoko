<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Keranjang - GoToko</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Keranjang Belanja</h1>
            <a href="/" class="btn btn-outline-secondary">Lanjut Belanja</a>
        </div>

        {{ if .Products }}
        <div class="card shadow-sm">
            <div class="card-body">
                {{ range $index, $item := .Products }}
                <div class="d-flex justify-content-between align-items-center border-bottom py-3">
                    <div>
                        <h5 class="mb-1">{{ $item.Name }}</h5>
                        <small class="text-muted">Rp {{ $item.Price }}</small>
                    </div>
                    <form action="/cart/remove" method="POST">
                        <input type="hidden" name="index" value="{{ $index }}">
                        <button type="submit" class="btn btn-sm btn-danger">Hapus</button>
                    </form>
                </div>
                {{ end }}

                <div class="mt-4 d-flex justify-content-between align-items-center">
                    <h4>Total</h4>
                    <h4>Rp {{ .Total }}</h4>
                </div>

                <div class="mt-3">
                    <a href="/checkout" class="btn btn-success w-100">Lanjut Checkout</a>
                </div>
            </div>
        </div>
        {{ else }}
        <div class="alert alert-info">Keranjang masih kosong.</div>
        {{ end }}
    </div>
</body>
</html>
