<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<div class="bg-white p-6 rounded shadow w-80">
<h2 class="text-lg font-bold mb-3">Login Admin</h2>

<input id="u" placeholder="Username" class="input">
<input id="p" type="password" placeholder="Password" class="input">

<button onclick="login()" class="btn mt-3">Login</button>
</div>

<style>
.input{width:100%;border:1px solid #ddd;padding:10px;margin-top:10px;border-radius:10px;}
.btn{background:#16a34a;color:white;padding:10px;width:100%;border-radius:10px;}
</style>

<script>
async function login(){
const body=new URLSearchParams()
body.append("username",u.value)
body.append("password",p.value)

const res=await fetch('/login',{method:'POST',body})

if(res.ok){
location.href='/dashboard.html'
}else{
alert("login gagal")
}
}
</script>

</body>
</html>
